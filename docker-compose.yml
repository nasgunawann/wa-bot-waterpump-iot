services:
  bot-server:
    build: .
    container_name: bot-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Expose port 3000 ke host
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RECIPIENT_NUMBER=${RECIPIENT_NUMBER}
      - GROUP_JID=${GROUP_JID}
      - MESSAGE_TEXT=${MESSAGE_TEXT:-Sensor tersentuh!}
      - API_KEY=${API_KEY}
    volumes:
      # Sesi WA tersimpan permanen di folder lokal
      - ./auth_info_baileys:/app/auth_info_baileys:z
    networks:
      - bot-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bot-server-tunnel
    restart: unless-stopped
    # Update: Menggunakan tunnel run tanpa --no-autoupdate jika di VPS
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    networks:
      - bot-network
    depends_on:
      bot-server:
        condition: service_healthy

networks:
  bot-network:
    name: iot_shared_network